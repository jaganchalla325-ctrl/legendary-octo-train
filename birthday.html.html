<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Siri</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Poppins', sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4,#fbc2eb);
    position:relative;
}

.card{
    width:360px;
    padding:30px;
    border-radius:25px;
    text-align:center;
    background:rgba(255,255,255,0.18);
    backdrop-filter:blur(10px);
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
    color:white;
    z-index:2;
    animation:float 3s ease-in-out infinite;
}

.profile{
    width:130px;
    height:130px;
    border-radius:50%;
    object-fit:cover;
    border:4px solid white;
    margin-bottom:15px;
}

h1{
    font-size:2.2rem;
    margin-bottom:10px;
}

h2{
    font-size:1.5rem;
    margin-bottom:10px;
    color:#fff5c3;
}

.date{
    color:#ffe066;
    margin-bottom:20px;
    font-weight:bold;
}

p{
    line-height:1.7;
    font-size:1rem;
}

.heart{
    font-size:40px;
    margin-top:20px;
    animation:pulse 1.5s infinite;
}

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.2);}
    100%{transform:scale(1);}
}

@keyframes float{
    0%{transform:translateY(0px);}
    50%{transform:translateY(-10px);}
    100%{transform:translateY(0px);}
}

/* Balloons */
.balloon{
    position:absolute;
    bottom:-150px;
    width:60px;
    animation:rise 12s infinite ease-in;
}

.balloon:nth-child(1){left:10%; animation-duration:10s;}
.balloon:nth-child(2){left:30%; animation-duration:14s;}
.balloon:nth-child(3){left:50%; animation-duration:11s;}
.balloon:nth-child(4){left:70%; animation-duration:13s;}
.balloon:nth-child(5){left:90%; animation-duration:15s;}

@keyframes rise{
    0%{
        transform:translateY(0);
        opacity:1;
    }
    100%{
        transform:translateY(-120vh);
        opacity:0;
    }
}

/* Fireworks */
.firework{
    position:absolute;
    width:6px;
    height:6px;
    border-radius:50%;
    background:white;
    box-shadow:
    0 0 10px white,
    20px 20px pink,
    -20px -20px yellow,
    20px -20px cyan,
    -20px 20px orange;
    animation:explode 2s infinite;
}

.firework:nth-child(1){top:20%;left:20%;}
.firework:nth-child(2){top:30%;left:80%;}
.firework:nth-child(3){top:70%;left:50%;}

@keyframes explode{
    0%{
        transform:scale(0.2);
        opacity:1;
    }
    100%{
        transform:scale(2);
        opacity:0;
    }
}

</style>
</head>

<body>

<!-- Background Music -->
<audio autoplay loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<!-- Balloons -->
<img src="https://cdn-icons-png.flaticon.com/512/3468/3468371.png" class="balloon">
<img src="https://cdn-icons-png.flaticon.com/512/3468/3468371.png" class="balloon">
<img src="https://cdn-icons-png.flaticon.com/512/3468/3468371.png" class="balloon">
<img src="https://cdn-icons-png.flaticon.com/512/3468/3468371.png" class="balloon">
<img src="https://cdn-icons-png.flaticon.com/512/3468/3468371.png" class="balloon">

<!-- Fireworks -->
<div class="firework"></div>
<div class="firework"></div>
<div class="firework"></div>

<!-- Birthday Card -->
<div class="card">

    <!-- Her Photo -->
<img src="siri.png" class="profile">
    <h1>🎂 Happy Birthday 🎂</h1>
    <h2>Siri 💖</h2>

    <div class="date">16 May</div>

    <p>
        Wishing you endless happiness, beautiful moments,
        and lots of love on your special day.
        May your smile shine brighter than ever
        and all your dreams come true ✨
    </p>

    <div class="heart">💝</div>

</div>

</body>
</html>
